<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ثبت واکسن</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body id="createVaccinePage">
  <div id="header"></div>
  <div class="container">
    <h1>ثبت واکسن</h1>
    <form id="vaccineForm" class="form">
      <label>نام واکسن
        <input type="text" id="vname" required>
      </label>
      <label>فاصله تزریق (ماه)
        <input type="number" id="interval" required>
      </label>
      <button type="submit">ثبت</button>
    </form>
    <div id="vaccineMsg" class="message"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
